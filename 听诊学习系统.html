// AI Explanation
function ai_explain(eid, qid) {
  var qs = gq(eid);
  for (var i = 0; i < qs.length; i++) {
    if (qs[i].id === qid) {
      var q = qs[i];
      var cid = 'explain-' + eid + '-' + qid;
      var el = document.getElementById(cid);
      if (!el) return;
      if (el.classList.contains('show')) {
        el.classList.remove('show');
        return;
      }
      if (st.explanations[eid] && st.explanations[eid][qid]) {
        el.classList.add('show');
        el.setAttribute('data-loaded', 'true');
        el.innerHTML = buildExplainBar(cid) + '<div class="content">' + st.explanations[eid][qid] + '</div>';
        return;
      }
      if (el.getAttribute('data-loading') === 'true') return;
      el.classList.add('show');
      el.setAttribute('data-loading', 'true');
      el.innerHTML = '<div class="loading">⏳ AI 正在解析中...</div>';
      var opts = [];
      for (var j = 0; j < (q.options||[]).length; j++) {
        opts.push(q.options[j][0] + '. ' + q.options[j][1]);
      }
      var ca = ga(eid, qid);
      var ua = (st.answers[eid]||{})[qid] || '';
      fetch('http://localhost:5001/explain', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          question: q.question || '',
          options: opts,
          answer: ca,
          userAnswer: ua
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        el.setAttribute('data-loading', 'false');
        el.setAttribute('data-loaded', 'true');
        if (data.success) {
          if (!st.explanations[eid]) st.explanations[eid] = {};
          var safeHtml = escHtml(data.explanation);
          st.explanations[eid][qid] = safeHtml;
          save();
          el.innerHTML = buildExplainBar(cid) + '<div class="content">' + safeHtml + '</div>';
        } else {
          el.innerHTML = '<div class="error">' + escHtml(data.explanation) + '</div>';
        }
      })
      .catch(function(err) {
        el.setAttribute('data-loading', 'false');
        el.innerHTML = '<div class="error">❌ 连接失败。\n\n请通过以下地址访问：\n  http://localhost:5001/tingzhen\n\n确保服务器已运行：python ai_server.py</div>';
      });
      return;
    }
  }
}

function showCachedExplanations(eid, qid) {

    var el = document.getElementById('explain-' + eid + '-' + qid);
    if (el && !el.classList.contains('show')) {

      el.innerHTML = buildExplainBar(cid) + '<div class="content">' + st.explanations[eid][qid] + '</div>';

function toggleHL(cid) {

document.addEventListener('mouseup', function(e) {
  if (hlActive) {
    var el = document.getElementById(hlActive);
    if (!el) return;
    var contentEl = el.querySelector('.content');
    if (!contentEl) return;
    if (e.target.tagName === 'MARK') {
      window.getSelection().removeAllRanges();
      return;
    }
    var sel = window.getSelection();
    if (!sel.rangeCount || sel.isCollapsed) return;
    var range = sel.getRangeAt(0);
    if (!contentEl.contains(range.commonAncestorContainer)) return;
    try {
      var mark = document.createElement('mark');
      range.surroundContents(mark);
      sel.removeAllRanges();
      var parts = hlActive.split('-');
      st.explanations[parts[1]][parts[2]] = contentEl.innerHTML;
      save();
    } catch(err) {
      try {
        var fragment = range.extractContents();
        var mark = document.createElement('mark');
        mark.appendChild(fragment);
        range.insertNode(mark);
        sel.removeAllRanges();
        var parts = hlActive.split('-');
        st.explanations[parts[1]][parts[2]] = contentEl.innerHTML;
        save();
      } catch(err2) {}
    }
    return;
  }
  if (hlEraseActive) {
    if (e.target.tagName !== 'MARK') return;
    var el = document.getElementById(hlEraseActive);
    if (!el) return;
    var contentEl = el.querySelector('.content');
    if (!contentEl || !contentEl.contains(e.target)) return;
    var mk = e.target;
    var parent = mk.parentNode;
    while (mk.firstChild) {
      parent.insertBefore(mk.firstChild, mk);
    }
    parent.removeChild(mk);
    parent.normalize();
    window.getSelection().removeAllRanges();
    var parts = hlEraseActive.split('-');
    st.explanations[parts[1]][parts[2]] = contentEl.innerHTML;
    save();
    return;
  }
});
